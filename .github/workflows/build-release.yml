name: Build and Release APK

on:
  push:
    tags:
      - 'v*' # Trigger on tag push (e.g. v1.0.0)
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Important if llama.cpp is a submodule, though CMake FetchContent is used

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Create keystore.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "storeFile=${{ github.workspace }}/app/release.keystore" >> keystore.properties

      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | tr -d '\n\r ' | base64 --decode > app/release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease -PGGML_VULKAN=OFF

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk PocketNodeLite.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketNodeLite
          path: PocketNodeLite.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: PocketNodeLite.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
